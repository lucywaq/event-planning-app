<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Events - JamSpace</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .filter-container {
            display: flex;
            gap: 15px;
            margin: 30px 0;
            flex-wrap: wrap;
        }
        .filter-btn {
            background: #ffffff;
            border: 1px solid #cbd5e1;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            color: var(--gray-dark);
            transition: all 0.2s;
        }
        .filter-btn.active, .filter-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        .search-summary {
            font-size: 16px;
            color: var(--gray-dark);
            margin-bottom: 20px;
            display: none;
        }
        .no-results {
            text-align: center;
            padding: 50px 0;
            color: var(--gray-dark);
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="./index.html" class="logo">Jam<span>Space</span></a>
        <div class="nav-links">
            <a href="./index.html">Home</a>
            <a href="./listings.html" class="active">Find Events</a>
            <button class="btn-primary" id="nav-create-btn">Create Event</button>
        </div>
    </nav>

    <main class="container" style="margin-top: 40px;">
        <h1 style="color: var(--dark); margin-bottom: 10px;">Explore Events</h1>
        <p style="color: var(--gray-dark);">Filter through the active registries on the JamSpace network.</p>

        <div class="filter-container">
            <button class="filter-btn active" data-category="all">All Events</button>
            <button class="filter-btn" data-category="tech">Tech & Innovation</button>
            <button class="filter-btn" data-category="sports">Sports & Health</button>
            <button class="filter-btn" data-category="business">Business & Corporate</button>
        </div>

        <div class="search-summary" id="search-status"></div>

        <div class="event-grid" id="listings-grid">
            </div>
    </main>

    <script src="listings.js"></script>
</body>
</html>
